          ping_project "immigration-assets" "https://aosraqsdgceelwhfwjpm.supabase.co" "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvc3JhcXNkZ2NlZWx3aGZ3anBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzQ5MzgsImV4cCI6MjA5NTYxMDkzOH0.9y1t21ecDjfF1gZamGvH1DmNS9rKnx2lfKK8Uwx3OeE"
