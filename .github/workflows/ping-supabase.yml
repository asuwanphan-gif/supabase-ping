name: Ping Supabase Projects

on:
  schedule:
    - cron: '0 1 * * 1'
    - cron: '0 1 * * 4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all Supabase projects
        run: |
          ping_project() {
            NAME="$1"; URL="$2"; KEY="$3"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $KEY" -H "Authorization: Bearer $KEY" --max-time 15 "$URL/rest/v1/")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then echo "[OK]  $NAME -> HTTP $STATUS"
            else echo "[FAIL] $NAME -> HTTP $STATUS"; EXIT_CODE=1; fi
          }
          EXIT_CODE=0
          ping_project "ssk-rs" "https://qidtrlakxasksvovkopo.supabase.co" "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpZHRybGFreGFza3N2b3Zrb3BvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjE0MjAsImV4cCI6MjA5NjY5NzQyMH0.KBfnDMn0hR-DYSxqJjJ9SxDP2RYyHoLfQstKI3KPq9o"
